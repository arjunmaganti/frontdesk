version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: frontdesk-bot
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    container_name: frontdesk-crawler
    restart: always
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    container_name: frontdesk-admin
    restart: always
    ports:
      - "80:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: frontdesk-webapp
    restart: always
    ports:
      - "8080:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
