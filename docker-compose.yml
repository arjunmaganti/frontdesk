version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: frontdesk-bot
    restart: always
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawler:
    build:
      context: .
      dockerfile: jobs/Dockerfile
    container_name: frontdesk-crawler
    restart: always
    env_file:
      - .env
    volumes:
      - ./flyers:/app/flyers
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
