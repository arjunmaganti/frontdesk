name: Deploy to DigitalOcean Droplet

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/frontdesk || (git clone https://github.com/arjunmaganti/frontdesk.git /root/frontdesk && cd /root/frontdesk)
            git checkout main
            git pull origin main
            docker compose up -d --build
            # Run database migrations and reload API schema cache automatically
            docker compose exec -T crawler python crawler/run_migration.py

      - name: Tag Released Version as "Golden"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 1. Delete the remote "Golden" tag first (prevents conflicts or drift)
          git push origin :refs/tags/Golden || true
          # 2. Delete the local "Golden" tag if it exists
          git tag -d Golden || true
          # 3. Create a fresh tag pointing to the currently released commit
          git tag Golden
          # 4. Push the fresh tag to remote origin
          git push origin refs/tags/Golden
